name: goblin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  eslint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'  # меняем yarn на npm
      - run: npm ci || npm install  # меняем yarn на npm
      - run: npm run lint  # если у тебя есть скрипт lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'  # меняем yarn на npm
      - run: npm ci || npm install
      - run: npm test

  build:
    needs: [eslint, test]
    if: success()  # запускаем только если eslint и test прошли успешно

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'  # меняем yarn на npm
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Build project
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # убираем dist в кавычках
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4